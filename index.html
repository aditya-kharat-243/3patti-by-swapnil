<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>3 Patti Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container py-4">

<div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center mb-4 gap-2">
<h2 class="mb-0">3 Patti Tracker</h2>

<div class="d-flex gap-2 flex-column flex-sm-row justify-content-end w-100 w-sm-auto action-buttons">
<button class="btn btn-success w-100 w-sm-auto" id="openMemberModal">
Add Member
</button>

<button class="btn btn-danger w-100 w-sm-auto" id="clearData">
Clear Data
</button>
</div>
</div>

<div class="alert alert-info">
Enter round amount → Show or Pack → Select Winner → Complete Round
</div>

<div id="balanceContainer"></div>

<div id="gameContainer"></div>

</div>

<!-- Modal -->

<div class="modal fade" id="memberModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>Add Members</h5>
</div>

<div class="modal-body">

<div id="memberInputs"></div>

<button class="btn btn-secondary mt-2" id="addMoreMember">
Add More
</button>

</div>

<div class="modal-footer">
<button class="btn btn-primary" id="saveMembers">
Add
</button>

<button class="btn btn-secondary" data-bs-dismiss="modal">
Cancel
</button>
</div>

</div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/redux/4.2.1/redux.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/redux/4.2.1/redux.min.js"></script>

<script src="js/reducer.js"></script>
<script src="js/store.js"></script>
<script src="js/actions.js"></script>
<script src="js/persistence.js"></script>
<script src="js/app.js"></script>

</body>
</html>
